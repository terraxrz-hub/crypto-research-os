# Extends _common.schema.yaml. A Playbook is an ordered procedure — see
# /playbooks/README.md.
$schema: "http://json-schema.org/draft-07/schema#"
$id: "playbook.schema.yaml"
allOf:
  - $ref: "_common.schema.yaml"
  - type: object
    required: [phases, produces]
    properties:
      phases:
        type: array
        items: { type: string }
        description: "Ordered list of named phases/steps."
      depends_on:
        type: array
        items: { type: string }
        description: "ids of Rules/Frameworks invoked by this Playbook's phases."
      produces:
        type: string
        enum: [research]
        description: "The object type this Playbook's completed execution generates."

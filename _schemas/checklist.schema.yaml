# Extends _common.schema.yaml. A Checklist is a finite, enumerable,
# machine-checkable item list — see /checklists/README.md.
$schema: "http://json-schema.org/draft-07/schema#"
$id: "checklist.schema.yaml"
allOf:
  - $ref: "_common.schema.yaml"
  - type: object
    required: [items, validates, machine_checkable]
    properties:
      items:
        type: array
        items:
          type: object
          required: [id, question]
          properties:
            id: { type: integer }
            question: { type: string }
      validates:
        type: array
        items: { type: string }
        description: "ids of Playbooks/Rules this checklist gates."
      machine_checkable:
        type: boolean
      enforced_by:
        type: array
        items: { type: string }

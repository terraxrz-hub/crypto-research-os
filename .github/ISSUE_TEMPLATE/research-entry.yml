name: "Research Entry"
description: "One row of the Research Database — a story evaluated, verified, and (maybe) published. File one even for stories that end in WAIT."
title: "[Research] "
labels: ["type:research", "status:in-progress"]
body:
  - type: markdown
    attributes:
      value: |
        Fills the role of the old static "Research Template" page — but every entry here is a queryable, permanent row instead of a form that gets discarded after publishing. See `docs/` for the standards this form invokes.

  - type: input
    id: candidate-story
    attributes:
      label: Candidate story
      placeholder: "One-line description of the story"
    validations:
      required: true

  - type: textarea
    id: story-selection
    attributes:
      label: Story selection
      description: "Why this story? Alternative stories considered? Why does this one have the highest EV? (Decision Framework — docs/06-decision-framework.md)"
    validations:
      required: true

  - type: dropdown
    id: evidence-tier
    attributes:
      label: Evidence Tier (docs/02-evidence-framework.md)
      options:
        - "Tier 1 — Primary Evidence"
        - "Tier 2 — Independent Confirmation"
        - "Tier 3 — Trusted Intermediaries"
        - "Tier 4 — Corroborated Secondary"
        - "Tier 5 — Single-Source Reporting"
        - "Tier 6 — Unverified"
        - "Tier 7 — Verified False"
        - "Mixed evidence chain"
    validations:
      required: true

  - type: textarea
    id: verification
    attributes:
      label: Verification
      description: "Facts confirmed / facts still uncertain / conflicting reports. Cite sources per docs/01-sources-and-priority.md."
    validations:
      required: true

  - type: textarea
    id: mechanism
    attributes:
      label: Mechanism
      description: "What happened? How did it happen? Why does it matter? Any common misconception?"
    validations:
      required: true

  - type: textarea
    id: draft
    attributes:
      label: Writing draft
      description: "Standalone tweet (default) or thread if genuinely required. See docs/03-writing-and-mechanism.md."
    validations:
      required: true

  - type: textarea
    id: visuals
    attributes:
      label: Visual assets
      description: "Recommended visual, source, evidence level, why it adds value. See docs/04-visual-assets.md. Write 'No supporting visual recommended' if none qualify."

  - type: checkboxes
    id: qa-gate
    attributes:
      label: "QA Gate (docs/08-qa-gate.md) — all ten must be checked before status:PASS or status:PASS-WITH-LIMITATIONS can be applied"
      options:
        - label: "1. Every factual claim independently verified"
        - label: "2. Prices/market data refreshed immediately before publication"
        - label: "3. Facts, analysis, and uncertainty clearly separated"
        - label: "4. Conclusion proportional to available evidence"
        - label: "5. Mechanism explained before conclusion"
        - label: "6. Would stand behind every sentence six months from now"
        - label: "7. Teaches something beyond today's headline"
        - label: "8. Highest expected-value story available right now"
        - label: "9. Still valuable if published anonymously"
        - label: "10. Every sentence survives scrutiny from a knowledgeable critic"

  - type: dropdown
    id: publication-status
    attributes:
      label: Publication status (docs/07-publication-standard.md)
      options:
        - "WAIT"
        - "PASS WITH LIMITATIONS"
        - "PASS"
    validations:
      required: true

  - type: textarea
    id: limitations
    attributes:
      label: Verification limitations (if any)
      description: "State explicitly — never hide a gap. Required if status is not PASS."

  - type: textarea
    id: outcome
    attributes:
      label: "Outcome (fill in later — post-publication review)"
      description: "Did the call hold up? Leave blank until a follow-up review. This is the field the audit flagged as missing entirely in V1."

name: Changelog Automation

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"

permissions:
  contents: read
  issues: write

jobs:
  open-changelog-entry:
    runs-on: ubuntu-latest
    # A commit message containing "[skip-changelog]" (e.g. a typo fix with
    # no rule-level meaning) skips auto-opening an issue, so the
    # type:changelog queue stays reserved for changes worth explaining.
    if: ${{ !contains(github.event.head_commit.message, '[skip-changelog]') }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - name: Get changed documentation files
        id: diff
        shell: bash
        run: |
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            FILES=$(git diff --name-only HEAD~1 HEAD -- docs/)
          else
            FILES=$(git ls-files docs/)
          fi

          echo "FILES<<EOF" >> $GITHUB_ENV
          echo "$FILES" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Create changelog issue
        uses: actions/github-script@v7
        env:
          FILES: ${{ env.FILES }}
        with:
          script: |
            const sha = context.sha.substring(0, 7);
            const actor = context.actor;

            const files = process.env.FILES
              ? process.env.FILES
                  .split("\n")
                  .filter(Boolean)
                  .map(f => `- \`${f}\``)
                  .join("\n")
              : "- No documentation files detected.";

            const body = [
              "**Version:** (fill in — e.g. v2.1)",
              "",
              "**Section changed:**",
              files,
              "",
              "**Change:**",
              "(describe exactly what changed)",
              "",
              "**Reason:**",
              "(why was this change necessary?)",
              "",
              "**Impact:**",
              "(how does this affect future research or writing?)",
              "",
              "---",
              `_Auto-generated from commit ${sha} pushed by @${actor}._`
            ].join("\n");

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Changelog] docs change — ${sha}`,
              labels: ["type:changelog"],
              body
            });